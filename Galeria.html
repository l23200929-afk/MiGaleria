<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Galería de Imágenes</title>
 <style>
 img {
 width: 300px;
 height: auto;
 margin: 10px;
 border: 2px solid #ccc;
 border-radius: 8px;
 }
 </style>
</head>
<body>
 <h1>Mi Galería</h1>
 <p>Foto de un paisaje:</p>
 <img src="paisaje.jpg" alt="Paisaje natural">
 <p>Foto de una mascota:</p>
 <img src="perri.jpg" alt="Perro jugando ">
 <p>Foto de comida:</p>
 <img src="chilaquilesV.jpg" alt="Chilaquiles Verdes">
</body>
</html>
